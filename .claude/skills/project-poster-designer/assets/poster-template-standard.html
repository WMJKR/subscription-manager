<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{PRODUCT_NAME}} — 프로젝트 포스터</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  /*
    A2 세로 포스터, 420mm x 594mm (약 1:1.414).
    mm 단위를 그대로 써서 인쇄 시 실제 크기와 일치시킴.
    화면에서는 커 보이는 게 정상 — 브라우저 축소/스크린샷으로 확인할 것.
  */
  :root {
    --color-main: {{MAIN_COLOR}};      /* 예: #1F2933 */
    --color-accent: {{ACCENT_COLOR}};  /* 예: #FF6B4A */
    --color-neutral: {{NEUTRAL_COLOR}};/* 예: #F5F3EE */
    --color-ink: #1A1A1A;
    --color-paper: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 420mm;
    height: 594mm;
  }

  body {
    font-family: "Pretendard", -apple-system, sans-serif;
    color: var(--color-ink);
    background: var(--color-paper);
    display: flex;
    flex-direction: column;
  }

  @page { size: 420mm 594mm; margin: 0; }
  @media print {
    body { width: 420mm; height: 594mm; }
  }

  /* 1. 히어로 — 전체 높이 20~25% */
  .hero {
    flex: 0 0 23%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: var(--color-main);
    color: var(--color-paper);
    padding: 10mm 16mm;
    gap: 6mm;
  }
  .hero .product-name {
    font-size: 46mm;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .hero .catchphrase {
    font-size: 10mm;
    font-weight: 500;
    color: var(--color-accent);
  }

  /* 2. 문제 제기 */
  .problem {
    flex: 0 0 auto;
    padding: 10mm 20mm;
    text-align: center;
    font-size: 7mm;
    font-weight: 500;
    line-height: 1.5;
    color: var(--color-main);
  }

  /* 3. 스크린샷 쇼케이스 — 전체 높이 30~40%, 남는 공간을 채움 */
  .showcase {
    flex: 1 1 auto;
    min-height: 0; /* 이거 없으면 안의 이미지/svg 내용 크기 때문에 594mm를 넘겨서 흘러넘칠 수 있음 */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10mm;
    padding: 6mm 16mm;
    background: var(--color-neutral);
    overflow: hidden;
  }

  /* 세로형(모바일) 스크린샷용 폰 목업 프레임 */
  .mockup-phone {
    border: 3mm solid var(--color-ink);
    border-radius: 9mm;
    overflow: hidden;
    box-shadow: 0 4mm 10mm rgba(0,0,0,0.25);
    flex: 0 0 auto;
  }
  .mockup-phone img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .mockup-phone.primary { height: 220mm; }
  .mockup-phone.secondary { height: 190mm; }

  /* 가로형(웹/데스크톱) 스크린샷용 브라우저 목업 프레임 */
  .mockup-browser {
    width: 100%;
    border: 1.5mm solid var(--color-ink);
    border-radius: 3mm;
    overflow: hidden;
    box-shadow: 0 4mm 10mm rgba(0,0,0,0.2);
  }
  .mockup-browser .browser-bar {
    height: 7mm;
    background: var(--color-ink);
    display: flex;
    align-items: center;
    gap: 2mm;
    padding: 0 4mm;
  }
  .mockup-browser .browser-bar span {
    width: 2mm; height: 2mm; border-radius: 50%; background: var(--color-paper); opacity: 0.6;
  }
  .mockup-browser img { display: block; width: 100%; object-fit: cover; min-height: 0; }
  /*
    쇼케이스 안쪽 요소를 flex:1로 늘려서 남는 공간을 채우게 할 경우,
    그 체인에 있는 모든 flex 컨테이너(.showcase, 목업 래퍼, img/svg 자신)에
    min-height:0을 꼭 같이 줄 것. 안 그러면 flex 아이템은 기본값 min-height:auto 때문에
    이미지의 원본 비율로 계산된 높이보다 작아지지 못해 594mm를 넘겨 흘러넘친다.
    (실제로 이 템플릿을 테스트하다가 걸린 문제 — assets/check_overflow.py 로 항상 확인할 것)
  */

  /* 4. 핵심 기능 3가지 */
  .features {
    flex: 0 0 auto;
    display: flex;
    gap: 6mm;
    padding: 10mm 16mm;
  }
  .feature-card {
    flex: 1 1 0;
    background: var(--color-paper);
    border: 0.6mm solid var(--color-neutral);
    border-radius: 3mm;
    padding: 6mm;
    display: flex;
    flex-direction: column;
    gap: 3mm;
  }
  .feature-card .icon {
    width: 10mm; height: 10mm;
    /* PRD 근거 아이콘: 이모지 대신 간단한 SVG/CSS 도형으로 교체할 것 */
    background: var(--color-accent);
    border-radius: 2mm;
  }
  .feature-card .feature-name {
    font-size: 6mm;
    font-weight: 700;
    color: var(--color-main);
  }
  .feature-card .feature-desc {
    font-size: 4.2mm;
    font-weight: 400;
    line-height: 1.4;
    color: #4A4A4A;
  }

  /* 5. 최하단 띠 */
  .footer {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6mm 16mm;
    background: var(--color-main);
    color: var(--color-paper);
  }
  .footer .author { font-size: 4mm; font-weight: 500; opacity: 0.85; }
  .footer .closing-copy { font-size: 4.5mm; font-weight: 600; }
  .footer .qr-placeholder {
    width: 20mm; height: 20mm;
    background: var(--color-paper);
    border-radius: 1.5mm;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-main);
    font-size: 2.6mm;
    text-align: center;
  }
</style>
</head>
<body>

  <section class="hero">
    <div class="product-name">{{PRODUCT_NAME}}</div>
    <div class="catchphrase">{{CATCHPHRASE}}</div>
  </section>

  <section class="problem">
    {{PROBLEM_STATEMENT}}
  </section>

  <section class="showcase">
    <!--
      스크린샷 방향에 따라 아래 프레임을 선택/조합할 것.
      - 세로형(모바일): .mockup-phone 안에 <img src="스크린샷 경로">
      - 가로형(웹): .mockup-browser 안에 .browser-bar + <img>
      이미지 개수(2~3장)와 방향에 맞게 이 섹션 전체를 다시 구성해도 됨.
      원본 비율을 유지할 것 — object-fit: cover로 잘리는 정도만 조정.
    -->
    <div class="mockup-phone secondary">
      <img src="{{SCREENSHOT_1_PATH}}" alt="{{SCREENSHOT_1_DESC}}">
    </div>
    <div class="mockup-phone primary">
      <img src="{{SCREENSHOT_2_PATH}}" alt="{{SCREENSHOT_2_DESC}}">
    </div>
    <div class="mockup-phone secondary">
      <img src="{{SCREENSHOT_3_PATH}}" alt="{{SCREENSHOT_3_DESC}}">
    </div>
  </section>

  <section class="features">
    <div class="feature-card">
      <div class="icon"></div>
      <div class="feature-name">{{FEATURE_1_NAME}}</div>
      <div class="feature-desc">{{FEATURE_1_DESC}}</div>
    </div>
    <div class="feature-card">
      <div class="icon"></div>
      <div class="feature-name">{{FEATURE_2_NAME}}</div>
      <div class="feature-desc">{{FEATURE_2_DESC}}</div>
    </div>
    <div class="feature-card">
      <div class="icon"></div>
      <div class="feature-name">{{FEATURE_3_NAME}}</div>
      <div class="feature-desc">{{FEATURE_3_DESC}}</div>
    </div>
  </section>

  <footer class="footer">
    <div class="author">{{AUTHOR_NAME}} · Personal Project</div>
    <div class="closing-copy">{{CLOSING_COPY}}</div>
    <div class="qr-placeholder">QR</div>
  </footer>

</body>
</html>
