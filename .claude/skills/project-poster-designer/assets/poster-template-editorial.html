<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{PRODUCT_NAME}} — 프로젝트 포스터</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  /*
    매거진 2단형(editorial) — A2 세로 420mm x 594mm.
    텍스트(문제·기능)와 이미지(스크린샷)를 좌/우 컬럼으로 나눈다.
    B2B·엔터프라이즈처럼 설명할 내용이 좀 더 많은 PRD에 어울린다.
    이 파일의 min-height:0 관련 주석은 poster-template-standard.html과 동일한 이유.
  */
  :root {
    --color-main: {{MAIN_COLOR}};
    --color-accent: {{ACCENT_COLOR}};
    --color-neutral: {{NEUTRAL_COLOR}};
    --color-ink: #1A1A1A;
    --color-paper: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 420mm; height: 594mm; }

  body {
    font-family: "Pretendard", -apple-system, sans-serif;
    color: var(--color-ink);
    background: var(--color-paper);
    display: flex;
    flex-direction: column;
  }

  @page { size: 420mm 594mm; margin: 0; }

  /* 1. 헤더 — 왼쪽 정렬, 세로형/비주얼형과 달리 좌측 하단에 캐치프레이즈 */
  .header {
    flex: 0 0 26%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: var(--color-main);
    color: var(--color-paper);
    padding: 14mm 16mm;
    gap: 6mm;
  }
  .header .eyebrow {
    font-size: 4.6mm;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--color-accent);
  }
  .header .product-name {
    font-size: 32mm;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .header .catchphrase {
    font-size: 8mm;
    font-weight: 500;
    opacity: 0.9;
  }

  /* 2. 본문 그리드 — 왼쪽 텍스트 컬럼 / 오른쪽 이미지 컬럼 */
  .body-grid {
    flex: 1 1 auto;
    min-height: 0; /* 없으면 오른쪽 컬럼 이미지 원본비율 때문에 594mm를 넘겨서 흘러넘침 */
    display: grid;
    grid-template-columns: 38% 62%;
  }

  .col-text {
    display: flex;
    flex-direction: column;
    gap: 10mm;
    padding: 12mm 14mm;
    background: var(--color-neutral);
  }
  .col-text .problem {
    font-size: 6.4mm;
    font-weight: 600;
    line-height: 1.5;
    color: var(--color-main);
    padding-bottom: 8mm;
    border-bottom: 0.6mm solid rgba(0,0,0,0.12);
  }
  .col-text .problem .highlight { color: var(--color-accent); }

  .col-text .features { display: flex; flex-direction: column; gap: 8mm; }
  .col-text .feature-item { display: flex; flex-direction: column; gap: 2mm; }
  .col-text .feature-name {
    font-size: 5.4mm;
    font-weight: 700;
    color: var(--color-main);
    display: flex;
    align-items: center;
    gap: 3mm;
  }
  .col-text .feature-name .icon { width: 6mm; height: 6mm; flex: 0 0 auto; }
  .col-text .feature-desc { font-size: 3.8mm; line-height: 1.45; color: #4A4A4A; }

  .col-images {
    display: flex;
    flex-direction: column;
    min-height: 0;
    gap: 5mm;
    padding: 12mm 14mm 12mm 5mm;
  }
  .col-images .frame {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border: 1.2mm solid var(--color-ink);
    border-radius: 2.5mm;
    overflow: hidden;
    box-shadow: 0 4mm 10mm rgba(0,0,0,0.18);
  }
  .col-images .frame.primary { flex-grow: 1.6; }
  .col-images .frame .browser-bar {
    flex: 0 0 auto;
    height: 7mm;
    background: var(--color-ink);
    display: flex;
    align-items: center;
    gap: 1.8mm;
    padding: 0 3.5mm;
  }
  .col-images .frame .browser-bar span {
    width: 1.8mm; height: 1.8mm; border-radius: 50%; background: var(--color-paper); opacity: 0.6;
  }
  .col-images .frame img,
  .col-images .frame svg {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  /* 3. 최하단 띠 — 전체 폭 */
  .footer {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6mm 16mm;
    background: var(--color-main);
    color: var(--color-paper);
  }
  .footer .author { font-size: 4mm; font-weight: 500; opacity: 0.85; }
  .footer .closing-copy { font-size: 4.5mm; font-weight: 600; }
  .footer .qr-placeholder {
    width: 20mm; height: 20mm;
    background: var(--color-paper);
    border-radius: 1.5mm;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-main);
    font-size: 2.6mm;
    text-align: center;
  }
</style>
</head>
<body>

  <header class="header">
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="product-name">{{PRODUCT_NAME}}</div>
    <div class="catchphrase">{{CATCHPHRASE}}</div>
  </header>

  <div class="body-grid">
    <div class="col-text">
      <div class="problem"><span class="highlight">{{PROBLEM_HIGHLIGHT}}</span> {{PROBLEM_STATEMENT}}</div>
      <div class="features">
        <div class="feature-item">
          <div class="feature-name"><svg class="icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/></svg>{{FEATURE_1_NAME}}</div>
          <div class="feature-desc">{{FEATURE_1_DESC}}</div>
        </div>
        <div class="feature-item">
          <div class="feature-name"><svg class="icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>{{FEATURE_2_NAME}}</div>
          <div class="feature-desc">{{FEATURE_2_DESC}}</div>
        </div>
        <div class="feature-item">
          <div class="feature-name"><svg class="icon" viewBox="0 0 24 24" fill="none"><path d="M12 3l9 18H3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>{{FEATURE_3_NAME}}</div>
          <div class="feature-desc">{{FEATURE_3_DESC}}</div>
        </div>
      </div>
    </div>

    <div class="col-images">
      <!-- 스크린샷 2~3장을 세로로 쌓음. 가장 핵심 화면에 class="frame primary" 부여해 더 크게 -->
      <div class="frame primary">
        <div class="browser-bar"><span></span><span></span><span></span></div>
        <img src="{{SCREENSHOT_1_PATH}}" alt="{{SCREENSHOT_1_DESC}}">
      </div>
      <div class="frame">
        <div class="browser-bar"><span></span><span></span><span></span></div>
        <img src="{{SCREENSHOT_2_PATH}}" alt="{{SCREENSHOT_2_DESC}}">
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="author">{{AUTHOR_NAME}} · Personal Project</div>
    <div class="closing-copy">{{CLOSING_COPY}}</div>
    <div class="qr-placeholder">QR</div>
  </footer>

</body>
</html>
